system:
  name: "lustre-agent"
  version: "0.1.0"

# Agent 配置 — 每个 Agent 可独立选择模型和 Provider
agents:
  supervisor:
    model_provider: anthropic
    model_name: "claude-sonnet-4-6"
    api_key: "${ANTHROPIC_API_KEY}"

  code:
    model_provider: anthropic
    model_name: "claude-sonnet-4-6"
    api_key: "${ANTHROPIC_API_KEY}"
    skills: []
    confirmation_gates:
      after_code: true  # 代码写完后、测试前是否需要确认

  test:
    model_provider: anthropic
    model_name: "claude-sonnet-4-6"
    api_key: "${ANTHROPIC_API_KEY}"
    auto_run: true  # 代码阶段完成后自动运行测试，无需确认

  research:
    model_provider: anthropic
    model_name: "claude-sonnet-4-6"
    api_key: "${ANTHROPIC_API_KEY}"

# 消息总线配置
message_bus:
  type: memory          # 开发用内存总线；生产可改为 redis
  redis_url: "redis://localhost:6379"
  max_hops: 10          # 防死循环：消息转发超过此数则丢弃
  request_timeout: 300  # 同步请求超时（秒）

# 路径配置
skills_dir: "~/.lustre/skills"
session_dir: "~/.lustre/sessions"
log_dir: "~/.lustre/logs"

# 工具配置
tools:
  terminal:
    enabled: true
    timeout: 60        # Shell 命令超时（秒）
  web_search:
    enabled: true
